<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTC/EUR Trading Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>BTC/EUR Trading Bot</h1>

  <div class="status-bar">
    <span id="lastUpdate">Loading...</span>
    <span id="uptime"></span>
  </div>

  <div id="error"></div>

  <div class="card">
    <h2>Status</h2>
    <div class="grid">
      <div class="metric">
        <div class="value" id="state">-</div>
        <div class="label">State</div>
      </div>
      <div class="metric">
        <div class="value" id="price">-</div>
        <div class="label">BTC/EUR Price</div>
      </div>
      <div class="metric">
        <div class="value" id="target">-</div>
        <div class="label">Target Price</div>
      </div>
      <div class="metric">
        <div class="value" id="pnl">-</div>
        <div class="label">P&L</div>
      </div>
    </div>
  </div>

  <div class="card" id="pacificCard" style="display:none">
    <h2>Pacific Strategy</h2>
    <div><span id="pacificMode" class="badge">-</span></div>
    <p id="pacificExplain" class="pacific-explain"></p>
    <div class="ladder" id="pacificLadder"></div>
  </div>

  <div class="card">
    <h2>Balances</h2>
    <div class="grid">
      <div class="metric">
        <div class="value" id="btcBalance">-</div>
        <div class="label">BTC</div>
      </div>
      <div class="metric">
        <div class="value" id="eurBalance">-</div>
        <div class="label">EUR</div>
      </div>
      <div class="metric">
        <div class="value" id="currentValue">-</div>
        <div class="label">Current Value (EUR)</div>
      </div>
      <div class="metric">
        <div class="value" id="initialBalance">-</div>
        <div class="label">Capital Aportado</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Trade History</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Side</th>
          <th>Price</th>
          <th>BTC</th>
          <th>EUR</th>
        </tr>
      </thead>
      <tbody id="trades"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Aportes / Saques</h2>
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Balance After</th>
        </tr>
      </thead>
      <tbody id="cashflows"></tbody>
    </table>
  </div>

  <script>
    // Token is stored in localStorage. Set it once via browser console:
    // localStorage.setItem('bot_token', 'your_token_here')
    const token = localStorage.getItem('bot_token') || '';
    if (!token) {
      var t = prompt('Enter dashboard token:');
      if (t) localStorage.setItem('bot_token', t);
    }

    var headers = { 'Authorization': 'Bearer ' + (localStorage.getItem('bot_token') || '') };

    function fmt(n, decimals) {
      return Number(n).toFixed(decimals);
    }

    function formatTime(iso) {
      const d = new Date(iso);
      if (isNaN(d.getTime()) || d.getFullYear() < 2000) return '—';
      return d.toLocaleString();
    }

    function pctStr(x) { return (x * 100).toFixed(1) + '%'; }
    function eur(x) { return '€' + fmt(x, 2); }

    function explainPacific(p) {
      const rec = pctStr(p.escapeRecoveryPct);
      if (p.holdingBtc) {
        return 'Holding BTC. Sells at ' + eur(p.profitTarget) + ' (+' + pctStr(p.sellThresholdPct)
          + '). Never sells below the buy price.';
      } else {
        if (p.mode === 'escape-armed')
          return 'Escape armed. Tracking peak ' + eur(p.highSinceTrade)
            + '; buys back at ' + eur(p.escapeTarget) + ' (−' + rec + ' from peak).';
        return 'Holding EUR. Buys back at ' + eur(p.profitTarget) + ' (−' + pctStr(p.buyThresholdPct)
          + '), or if price rises to ' + eur(p.escapeArmPrice) + ' (+' + pctStr(p.escapeDrawdownPct)
          + ') buys on a ' + rec + ' pullback from the peak.';
      }
    }

    function renderLadder(p, currentPrice) {
      const markers = [
        { label: 'Last', price: p.lastTradePrice, cls: 'last' },
        { label: p.holdingBtc ? 'Sell target' : 'Buy target', price: p.profitTarget, cls: 'profit' },
        { label: 'Now', price: currentPrice, cls: 'current' },
      ];
      if (p.escapeArmPrice != null)
        markers.push({ label: 'Escape arm', price: p.escapeArmPrice, cls: 'escape-arm' });
      if (p.escapeTarget != null)
        markers.push({ label: 'Escape target', price: p.escapeTarget, cls: 'escape-target' });

      const prices = markers.map(function (m) { return m.price; });
      const min = Math.min.apply(null, prices);
      const max = Math.max.apply(null, prices);
      const span = (max - min) || 1;
      const lo = min - span * 0.1;
      const range = span * 1.2;

      document.getElementById('pacificLadder').innerHTML =
        '<div class="ladder-track"></div>' + markers.map(function (m) {
          const left = ((m.price - lo) / range * 100).toFixed(2);
          return '<div class="ladder-marker ' + m.cls + '" style="left:' + left + '%">'
            + '<span class="ml">' + m.label + '</span>'
            + '<span class="tick"></span>'
            + '<span class="mp">' + eur(m.price) + '</span></div>';
        }).join('');
    }

    function renderPacific(p, currentPrice) {
      const card = document.getElementById('pacificCard');
      if (!p) { card.style.display = 'none'; return; }
      card.style.display = 'block';

      const modeEl = document.getElementById('pacificMode');
      const labels = { 'normal': 'Normal', 'escape-armed': 'Escape armed' };
      modeEl.textContent = labels[p.mode] || p.mode;
      modeEl.className = 'badge ' + p.mode;

      document.getElementById('pacificExplain').textContent = explainPacific(p);
      renderLadder(p, currentPrice);
    }

    function formatUptime(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      return h + 'h ' + m + 'm';
    }

    async function fetchData() {
      try {
        const [statusRes, tradesRes, cashflowsRes] = await Promise.all([
          fetch('/api/status', { headers: headers }),
          fetch('/api/trades?limit=20', { headers: headers }),
          fetch('/api/cashflows?limit=20', { headers: headers }),
        ]);

        if (!statusRes.ok || !tradesRes.ok || !cashflowsRes.ok) {
          throw new Error('Unauthorized or server error');
        }

        const status = await statusRes.json();
        const { trades } = await tradesRes.json();
        const { cashFlows } = await cashflowsRes.json();

        document.getElementById('error').style.display = 'none';

        // Status
        const stateEl = document.getElementById('state');
        if (status.btcAllocationPct >= 50) {
          stateEl.innerHTML = '<span class="badge btc">HOLDING BTC</span>';
        } else {
          stateEl.innerHTML = '<span class="badge eur">HOLDING EUR</span>';
        }

        document.getElementById('price').textContent = '€' + fmt(status.currentBtcPrice, 2);
        document.getElementById('target').textContent = status.targetPrice != null ? '€' + fmt(status.targetPrice, 2) : '—';

        const pnlEl = document.getElementById('pnl');
        pnlEl.textContent = '€' + fmt(status.pnlEur, 2) + ' (' + fmt(status.pnlPct, 2) + '%)';
        pnlEl.className = 'value ' + (status.pnlEur >= 0 ? 'pnl-positive' : 'pnl-negative');

        // Pacific strategy card
        renderPacific(status.pacific, status.currentBtcPrice);

        // Balances
        document.getElementById('btcBalance').textContent = fmt(status.btcBalance, 8);
        document.getElementById('eurBalance').textContent = '€' + fmt(status.eurBalance, 2);
        document.getElementById('initialBalance').textContent = '€' + fmt(status.initialBalanceEur, 2);

        const currentValue = status.btcAllocationPct >= 50
          ? status.btcBalance * status.currentBtcPrice
          : status.eurBalance;
        document.getElementById('currentValue').textContent = '€' + fmt(currentValue, 2);

        // Uptime
        document.getElementById('uptime').textContent = 'Uptime: ' + formatUptime(status.uptimeMs);

        // Trades
        const tbody = document.getElementById('trades');
        tbody.innerHTML = trades.map(function(t) {
          var side = (t.side || '').toUpperCase();
          return '<tr>'
            + '<td>' + formatTime(t.timestamp) + '</td>'
            + '<td class="' + (side === 'BUY' ? 'buy' : 'sell') + '">' + side + '</td>'
            + '<td>€' + fmt(t.price, 2) + '</td>'
            + '<td>' + fmt(t.quantityBtc, 8) + '</td>'
            + '<td>€' + fmt(t.quoteAmountEur, 2) + '</td>'
            + '</tr>';
        }).join('');

        // Cash flows
        const cfBody = document.getElementById('cashflows');
        cfBody.innerHTML = cashFlows.map(function(c) {
          var type = c.type || '';
          return '<tr>'
            + '<td>' + formatTime(c.timestamp) + '</td>'
            + '<td class="' + (type === 'Deposit' ? 'buy' : 'sell') + '">' + type + '</td>'
            + '<td>€' + fmt(c.amountEur, 2) + '</td>'
            + '<td>€' + fmt(c.balanceAfter, 2) + '</td>'
            + '</tr>';
        }).join('');

        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch (err) {
        var errorEl = document.getElementById('error');
        errorEl.textContent = 'Error: ' + err.message;
        errorEl.style.display = 'block';
      }
    }

    fetchData();
    setInterval(fetchData, 10000);
  </script>
</body>
</html>
