name: Deploy Binance Bot

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes? (para hotfixes urgentes)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1 — Testes
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    if: ${{ inputs.skip_tests != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ─────────────────────────────────────────────
  # Job 2 — Build e push da imagem Docker
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3 — Deploy na VPS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yml para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/opt/binance-bot"
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: BINANCE_API_KEY,BINANCE_API_SECRET,BINANCE_USE_TESTNET,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,DASHBOARD_AUTH_TOKEN
          script: |
            cd /opt/binance-bot

            # Escrever .env com valores dos GitHub Secrets
            printf '%s\n' \
              "BINANCE_API_KEY=${BINANCE_API_KEY}" \
              "BINANCE_API_SECRET=${BINANCE_API_SECRET}" \
              "BINANCE_USE_TESTNET=${BINANCE_USE_TESTNET}" \
              "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" \
              "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" \
              "DASHBOARD_AUTH_TOKEN=${DASHBOARD_AUTH_TOKEN}" \
              > .env

            # Pull nova imagem (package publico, sem login)
            docker compose pull

            # Reiniciar container
            docker compose up -d --remove-orphans

            # Remover imagens antigas
            docker image prune -f

            echo "Deploy concluido: ${{ needs.build-and-push.outputs.short_sha }}"
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BINANCE_USE_TESTNET: ${{ secrets.BINANCE_USE_TESTNET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_AUTH_TOKEN: ${{ secrets.DASHBOARD_AUTH_TOKEN }}

      - name: Verificar health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' binance-bot 2>/dev/null || echo "running")
            echo "Container status: $STATUS"
            curl -sf http://localhost:3000/api/health || echo "WARNING: health check falhou"
            docker compose -f /opt/binance-bot/docker-compose.yml ps
